<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Admin</title>
    <link rel="stylesheet" href="/admin/css/dashboard.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div><h1>Skill</h1><p>Kelola skill yang tampil di halaman utama.</p></div>
        <div style="display:flex; gap: 10px; align-items:center;"><a class="btn-link" href="/admin/dashboard.html">Kembali</a></div>
      </div>
      <div class="card">
        <form id="skillForm">
          <input type="hidden" id="skillId" />
          <label>Nama Skill</label><input id="skillNama" required />
          <label>Icon Class</label><input id="skillIcon" />
          <button type="submit">Simpan Skill</button>
        </form>
        <div class="message" id="skillMessage"></div>
        <div class="list" id="skillList"></div>
      </div>
    </div>
    <script src="/admin/js/dashboard.js?v=20260626"></script>
  </body>
</html>
